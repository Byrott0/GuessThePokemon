name: CI Pipeline GuessThePokemon

on: 
  push: 
    branches: ["main"]

jobs: 
  build:
    runs-on: ubuntu-latest
    

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          
      # TODO: Add tests
      # - name: Run tests
      #   run: |
      #     pytest
      
      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install Node dependencies
        working-directory: frontend
        run: |
          npm ci
      
      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build
      